/events:
  get:
    summary: 캘린더 월별 일정 조회
    tags:
      - Calendar
    parameters:
      - name: year
        in: query
        required: true
        schema:
          type: integer
      - name: month
        in: query
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: 해당 월의 일정 목록 반환
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas.yaml#/EventResponse'
  post:
    summary: 일정 등록
    tags:
      - Calendar
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/EventCreate'
    responses:
      '201':
        description: 일정 등록 완료
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/EventResponse'

/events/{event_id}:
  put:
    summary: 일정 수정
    tags:
      - Calendar
    security:
      - BearerAuth: []
    parameters:
      - name: event_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/EventUpdate'
    responses:
      '200':
        description: 일정 수정 완료
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/EventResponse'
  delete:
    summary: 일정 삭제
    tags:
      - Calendar
    security:
      - BearerAuth: []
    parameters:
      - name: event_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: 삭제 완료
