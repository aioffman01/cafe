/posts:
  get:
    summary: 게시글 목록 조회
    tags:
      - Board
    parameters:
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          default: 0
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
    responses:
      '200':
        description: 게시글 목록 반환
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas.yaml#/PostResponse'
  post:
    summary: 게시글 작성
    tags:
      - Board
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/PostCreate'
    responses:
      '201':
        description: 게시글 생성 완료
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/PostResponse'

/posts/{post_id}:
  get:
    summary: 게시글 상세 조회 (댓글 포함)
    tags:
      - Board
    parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: 게시글 상세 데이터
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/PostDetailResponse'
      '404':
        description: 게시글을 찾을 수 없음
  put:
    summary: 게시글 수정
    tags:
      - Board
    security:
      - BearerAuth: []
    parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/PostUpdate'
    responses:
      '200':
        description: 게시글 수정 완료
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/PostResponse'
  delete:
    summary: 게시글 삭제
    tags:
      - Board
    security:
      - BearerAuth: []
    parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: 삭제 완료

/posts/{post_id}/comments:
  post:
    summary: 댓글 작성
    tags:
      - Board
    security:
      - BearerAuth: []
    parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/CommentCreate'
    responses:
      '201':
        description: 댓글 작성 완료
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/CommentResponse'

/posts/{post_id}/comments/{comment_id}:
  delete:
    summary: 댓글 삭제
    tags:
      - Board
    security:
      - BearerAuth: []
    parameters:
      - name: post_id
        in: path
        required: true
        schema:
          type: integer
      - name: comment_id
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: 삭제 완료
